[theme]
base            = "dark"
primaryColor    = "#f0a500"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor       = "#c9d1d9"
font            = "sans serif"

[browser]
gatherUsageStats = false

[server]
headless         = true
enableCORS       = false
enableXsrfProtection = true

[runner]
fastReruns       = true
