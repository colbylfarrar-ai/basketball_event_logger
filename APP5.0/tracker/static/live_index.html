<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#12141e">
<link rel="icon" href="/static/icon-192.png">
<title>HoopTracks Live — Scores</title>
<style>
/* Landing for the public fan links — same self-contained brand look as live.html. */
:root {
  --bg: #12141e; --bg2: #1a1d2b; --bg3: #232738; --edge: #343a52;
  --fg: #e8eaf0; --muted: #9aa0aa; --gold: #e6be64; --blue: #6ea8e0;
  --green: #4caf7d; --red: #e05c5c;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; background: var(--bg); color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.wrap { max-width: 640px; margin: 0 auto; padding: 12px 12px 24px; }
.brand { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.brand img { border-radius: 6px; }
.brand .t { font-weight: 800; font-size: 1.05rem; }
.brand .s { color: var(--muted); font-size: .75rem; margin-left: auto; }
h3 { font-size: .95rem; margin: 18px 0 8px; color: var(--muted);
  letter-spacing: .04em; }
.livecard { display: block; text-decoration: none; color: var(--fg);
  background: var(--bg2); border: 1px solid var(--edge); border-radius: 14px;
  padding: 12px 14px; margin-bottom: 10px; }
.livecard:active { filter: brightness(1.2); }
.livecard .top { display: flex; align-items: center; gap: 8px;
  color: var(--muted); font-size: .72rem; margin-bottom: 8px; }
.chip { font-size: .68rem; font-weight: 700; padding: 2px 9px;
  border-radius: 999px; letter-spacing: .06em; }
.chip.live { color: #fff; background: var(--red);
  animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 50% { opacity: .55; } }
.livecard .row { display: grid; grid-template-columns: 1fr auto; gap: 8px;
  align-items: baseline; }
.livecard .team { font-weight: 700; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; }
.livecard .pts { font-size: 1.3rem; font-weight: 800; }
.datebar { display: flex; gap: 8px; align-items: center; margin: 8px 0 10px; }
.datebar button, .datebar input {
  font: inherit; color: var(--fg); background: var(--bg3);
  border: 1px solid var(--edge); border-radius: 10px; min-height: 42px;
  padding: 6px 12px; cursor: pointer; }
.datebar input { flex: 1; text-align: center; color-scheme: dark; }
.filter { width: 100%; font: inherit; color: var(--fg); background: var(--bg3);
  border: 1px solid var(--edge); border-radius: 10px; min-height: 42px;
  padding: 6px 12px; margin-bottom: 8px; }
ul.slate { list-style: none; margin: 0; padding: 0; border: 1px solid var(--edge);
  border-radius: 12px; background: var(--bg2); overflow: hidden; }
ul.slate li { border-bottom: 1px solid var(--edge); }
ul.slate li:last-child { border-bottom: 0; }
ul.slate .g { display: grid; grid-template-columns: 1fr auto; gap: 10px;
  align-items: center; padding: 10px 12px; color: var(--fg);
  text-decoration: none; }
a.g:active { background: var(--bg3); }
.g .who { min-width: 0; }
.g .who .m { display: block; font-size: .88rem; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.g .who .sub { display: block; color: var(--muted); font-size: .7rem; margin-top: 2px; }
.g .right { text-align: right; font-size: .8rem; color: var(--muted);
  white-space: nowrap; }
.g .right .sc { color: var(--fg); font-weight: 700; font-size: .95rem; }
.g .right .live { color: var(--red); font-weight: 700; }
.g .right .link { color: var(--gold); font-weight: 600; }
.empty { padding: 22px 12px; text-align: center; color: var(--muted);
  font-size: .85rem; }
.rail { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
  -webkit-overflow-scrolling: touch; }
.rail a { flex: 0 0 auto; min-width: 150px; background: var(--bg2);
  border: 1px solid var(--edge); border-radius: 12px; padding: 8px 10px;
  color: var(--fg); text-decoration: none; font-size: .78rem; }
.rail a.nolink { pointer-events: none; }
.rail .rl { display: flex; justify-content: space-between; gap: 8px; }
.rail .rl .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 110px; }
.rail .rl b { font-weight: 800; }
.rail .sub { color: var(--muted); font-size: .68rem; margin-top: 3px; }
.chiprow { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.chiprow button { font: inherit; font-size: .78rem; color: var(--muted);
  background: var(--bg3); border: 1px solid var(--edge); border-radius: 999px;
  padding: 6px 12px; min-height: 36px; cursor: pointer; }
.chiprow button.on { color: var(--bg); background: var(--gold);
  border-color: var(--gold); font-weight: 700; }
.vtabs { display: flex; gap: 8px; margin-bottom: 12px; }
.vtabs button { flex: 1; font: inherit; color: var(--muted); cursor: pointer;
  background: var(--bg3); border: 1px solid var(--edge); border-radius: 10px;
  padding: 9px 14px; min-height: 42px; font-weight: 600; }
.vtabs button.on { color: var(--bg); background: var(--gold);
  border-color: var(--gold); font-weight: 700; }
ul.teams { list-style: none; margin: 0; padding: 0; border: 1px solid var(--edge);
  border-radius: 12px; background: var(--bg2); overflow: hidden; }
ul.teams li { border-bottom: 1px solid var(--edge); display: flex;
  align-items: stretch; }
ul.teams li:last-child { border-bottom: 0; }
ul.teams a { flex: 1; min-width: 0; display: grid;
  grid-template-columns: 44px 1fr auto; gap: 8px;
  align-items: center; padding: 10px 12px; color: var(--fg);
  text-decoration: none; }
ul.teams a:active { background: var(--bg3); }
.star { flex: 0 0 auto; width: 46px; font-size: 1.2rem; line-height: 1;
  color: var(--muted); background: transparent; border: 0;
  border-left: 1px solid var(--edge); cursor: pointer; }
.star.on { color: var(--gold); }
/* Following section (Scores view) — localStorage-only, no accounts */
ul.follow { list-style: none; margin: 0 0 4px; padding: 0;
  border: 1px solid var(--edge); border-radius: 12px; background: var(--bg2);
  overflow: hidden; }
ul.follow li { border-bottom: 1px solid var(--edge); }
ul.follow li:last-child { border-bottom: 0; }
ul.follow .f { display: grid; grid-template-columns: 1fr auto; gap: 10px;
  align-items: center; padding: 10px 12px; color: var(--fg);
  text-decoration: none; }
a.f:active { background: var(--bg3); }
ul.follow .nm { min-width: 0; font-weight: 600; font-size: .9rem;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
ul.follow .st { text-align: right; font-size: .8rem; color: var(--muted);
  white-space: nowrap; }
ul.follow .st .live { color: var(--red); font-weight: 700; }
ul.follow .st .sc { color: var(--fg); font-weight: 700; }
ul.follow .st .link { color: var(--gold); font-weight: 600; }
ul.teams .rk { color: var(--gold); font-weight: 800; font-size: .9rem; }
ul.teams .rk.un { color: var(--muted); font-weight: 400; }
ul.teams .nm { min-width: 0; }
ul.teams .nm .m { display: block; font-size: .9rem; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
ul.teams .nm .sub { display: block; color: var(--muted); font-size: .7rem;
  margin-top: 2px; }
ul.teams .rec { font-weight: 700; font-size: .9rem; white-space: nowrap; }
.more { display: block; width: 100%; margin-top: 10px; font: inherit;
  color: var(--muted); background: var(--bg3); border: 1px solid var(--edge);
  border-radius: 10px; min-height: 42px; padding: 8px 12px; cursor: pointer; }
.season-note { color: var(--muted); font-size: .72rem; margin: -2px 0 8px; }
.footer { margin-top: 22px; text-align: center; color: var(--muted);
  font-size: .75rem; }
.footer a { color: var(--gold); text-decoration: none; font-weight: 600; }
[hidden] { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="/static/icon-192.png" alt="" width="24" height="24">
    <span class="t">HoopTracks Live</span>
    <span class="s">live scores &amp; schedules</span>
  </div>

  <div class="vtabs" role="tablist">
    <button id="v-scores" class="on">Scores</button>
    <button id="v-teams">Teams</button>
  </div>

  <div id="view-scores">
    <div id="follow-sec" hidden>
      <h3>FOLLOWING</h3>
      <ul class="follow" id="follow-list"></ul>
    </div>

    <div id="live-sec" hidden>
      <h3>LIVE NOW</h3>
      <div id="live-list"></div>
    </div>

    <div id="recent-sec" hidden>
      <h3>LATEST FINALS</h3>
      <div id="recent-rail" class="rail"></div>
    </div>

    <h3>SCHEDULE</h3>
    <div id="chips" class="chiprow" hidden></div>
    <div class="datebar">
      <button id="d-prev" aria-label="Previous day">&lsaquo;</button>
      <input id="d-pick" type="date" aria-label="Pick a date">
      <button id="d-next" aria-label="Next day">&rsaquo;</button>
    </div>
    <input id="filter" class="filter" type="search" placeholder="Filter by team…"
           autocomplete="off" hidden>
    <ul class="slate" id="slate"></ul>
  </div>

  <div id="view-teams" hidden>
    <input id="t-search" class="filter" type="search"
           placeholder="Search any team…" autocomplete="off">
    <div id="t-season" class="season-note" hidden></div>
    <div id="t-gender" class="chiprow"></div>
    <div id="t-classes" class="chiprow"></div>
    <div id="t-loading" class="empty">Loading teams…</div>
    <ul class="teams" id="t-list" hidden></ul>
    <button id="t-more" class="more" hidden>Show more</button>
  </div>

  <div class="footer">
    Live stats by <a href="https://hooptracks.com" rel="noopener">HoopTracks</a><br>
    <span>Coaches: track your team and share your own fan link.</span>
  </div>
</div>

<script>
(function () {
  'use strict';
  var $ = function (id) { return document.getElementById(id); };
  var data = null, timer = null, filterTxt = '';

  function localISO(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') +
      '-' + String(d.getDate()).padStart(2, '0');
  }
  var params = new URLSearchParams(location.search);
  var cur = /^\d{4}-\d{2}-\d{2}$/.test(params.get('d') || '')
    ? params.get('d') : localISO(new Date());
  var view = params.get('v') === 'teams' ? 'teams' : 'scores';

  function syncUrl() {
    var q = '?d=' + cur + (view === 'teams' ? '&v=teams' : '');
    history.replaceState(null, '', q);
  }

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  function qlabel(q) { return q > 4 ? 'OT' + (q - 4) : 'Q' + q; }

  // ── Following: localStorage only, no accounts, no server writes ──────────
  var FOLLOW_KEY = 'hooptracks_follow';
  function followList() {
    try { return JSON.parse(localStorage.getItem(FOLLOW_KEY) || '[]'); }
    catch (e) { return []; }
  }
  function isFollowing(id) {
    return followList().some(function (t) { return t.id === id; });
  }
  function toggleFollow(t) {
    var on = isFollowing(t.id);
    var l = followList().filter(function (x) { return x.id !== t.id; });
    if (!on) l.push({ id: t.id, name: t.name, gender: t.gender });
    try { localStorage.setItem(FOLLOW_KEY, JSON.stringify(l)); } catch (e) {}
    renderFollowing();
  }

  function renderFollowing() {
    var l = followList(), sec = $('follow-sec'), box = $('follow-list');
    if (!l.length) { sec.hidden = true; return; }
    sec.hidden = false;
    box.innerHTML = '';
    l.forEach(function (t) {
      // enrich from today's slate (rows carry team ids); newest render wins
      var g = ((data && data.games) || []).filter(function (x) {
        return x.home_id === t.id || x.away_id === t.id;
      })[0];
      var st, href = '/live/team/' + t.id;
      if (g && g.status === 'live') {
        st = '<span class="live">LIVE</span>' +
          (g.url ? ' · <span class="link">Watch</span>' : '');
        if (g.url) href = g.url;
      } else if (g && g.status === 'final') {
        st = '<span class="sc">' + g.home_score + '&ndash;' + g.away_score +
          '</span> Final' + (g.url ? ' · <span class="link">Box</span>' : '');
        if (g.url) href = g.url;
      } else if (g) {
        st = 'Today';
      } else {
        st = '<span class="link">Team page</span>';
      }
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.className = 'f';
      a.href = href;
      a.innerHTML = '<span class="nm">' + esc(t.name) + '</span>' +
        '<span class="st">' + st + '</span>';
      li.appendChild(a);
      box.appendChild(li);
    });
  }

  function renderLive() {
    var box = $('live-list');
    box.innerHTML = '';
    (data.live || []).forEach(function (g) {
      var a = document.createElement('a');
      a.className = 'livecard';
      a.href = g.url;
      a.innerHTML =
        '<div class="top"><span class="chip live">LIVE</span>' +
        '<span>' + esc(g.gender) + ' · ' + qlabel(g.quarter) + ' ' + esc(g.clock) + '</span></div>' +
        '<div class="row"><span class="team">' + esc(g.home) + '</span>' +
        '<span class="pts">' + g.home_pts + '</span></div>' +
        '<div class="row"><span class="team">' + esc(g.away) + '</span>' +
        '<span class="pts">' + g.away_pts + '</span></div>';
      box.appendChild(a);
    });
    $('live-sec').hidden = !(data.live || []).length;
  }

  function renderRecent() {
    var box = $('recent-rail');
    box.innerHTML = '';
    (data.recent || []).forEach(function (g) {
      var a = document.createElement('a');
      if (g.url) a.href = g.url; else a.className = 'nolink';
      var hw = g.home_score > g.away_score;
      a.innerHTML =
        '<div class="rl"><span class="nm">' + esc(g.home) + '</span>' +
        (hw ? '<b>' : '<span>') + g.home_score + (hw ? '</b>' : '</span>') + '</div>' +
        '<div class="rl"><span class="nm">' + esc(g.away) + '</span>' +
        (!hw ? '<b>' : '<span>') + g.away_score + (!hw ? '</b>' : '</span>') + '</div>' +
        '<div class="sub">Final · ' + esc(g.gender) + ' · ' + esc(g.date) + '</div>';
      box.appendChild(a);
    });
    $('recent-sec').hidden = !(data.recent || []).length;
  }

  var chip = { gender: '', klass: '' };

  function renderChips() {
    var rows = data.games || [];
    var box = $('chips');
    var genders = [], classes = [];
    rows.forEach(function (g) {
      if (genders.indexOf(g.gender) < 0) genders.push(g.gender);
      (g.classes || []).forEach(function (c) {
        if (classes.indexOf(c) < 0) classes.push(c);
      });
    });
    classes.sort();
    box.hidden = rows.length <= 8 || (genders.length < 2 && classes.length < 2);
    if (box.hidden) { chip.gender = ''; chip.klass = ''; return; }
    box.innerHTML = '';
    function add(label, kind, val) {
      var b = document.createElement('button');
      b.textContent = label;
      var on = chip[kind] === val;
      if (on) b.classList.add('on');
      b.addEventListener('click', function () {
        chip[kind] = on ? '' : val;
        renderChips(); renderSlate();
      });
      box.appendChild(b);
    }
    if (genders.length > 1) genders.forEach(function (g) { add(g, 'gender', g); });
    classes.forEach(function (c) { add(c, 'klass', c); });
  }

  function renderSlate() {
    var ul = $('slate');
    ul.innerHTML = '';
    var rows = data.games || [];
    $('filter').hidden = rows.length <= 15;
    var f = filterTxt.toLowerCase();
    rows.forEach(function (g) {
      if (f && (g.home + ' ' + g.away).toLowerCase().indexOf(f) < 0) return;
      if (chip.gender && g.gender !== chip.gender) return;
      if (chip.klass && (g.classes || []).indexOf(chip.klass) < 0) return;
      var li = document.createElement('li');
      var el = document.createElement(g.url ? 'a' : 'div');
      el.className = 'g';
      if (g.url) el.href = g.url;
      var right;
      if (g.status === 'live') {
        right = '<span class="live">LIVE</span>';
      } else if (g.status === 'final') {
        right = '<span class="sc">' + g.home_score + '&ndash;' + g.away_score +
          '</span> Final' + (g.url ? ' · <span class="link">Box</span>' : '');
      } else {
        right = 'Upcoming';
      }
      el.innerHTML =
        '<span class="who"><span class="m">' + esc(g.home) + ' vs ' + esc(g.away) +
        '</span><span class="sub">' + esc(g.gender) +
        (g.location ? ' · ' + esc(g.location) : '') + '</span></span>' +
        '<span class="right">' + right + '</span>';
      li.appendChild(el);
      ul.appendChild(li);
    });
    if (!ul.children.length) {
      ul.innerHTML = '<li><div class="empty">No games on this date</div></li>';
    }
  }

  function load() {
    fetch('/api/public/scoreboard?date=' + encodeURIComponent(cur))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (d) { data = d; renderLive(); renderRecent(); renderChips();
          renderSlate(); renderFollowing(); }
      })
      .catch(function () { /* keep last render */ })
      .then(function () {
        clearTimeout(timer);
        timer = setTimeout(load, 20000);
      });
  }

  function setDate(iso) {
    cur = iso;
    $('d-pick').value = iso;
    syncUrl();
    load();
  }

  function shift(days) {
    var p = cur.split('-');
    var d = new Date(+p[0], +p[1] - 1, +p[2] + days);
    setDate(localISO(d));
  }

  $('d-pick').value = cur;
  $('d-pick').addEventListener('change', function () {
    if (this.value) setDate(this.value);
  });
  $('d-prev').addEventListener('click', function () { shift(-1); });
  $('d-next').addEventListener('click', function () { shift(1); });
  $('filter').addEventListener('input', function () {
    filterTxt = this.value.trim();
    renderSlate();
  });

  // ── Teams view: directory + rankings snapshot ────────────────────────────
  // Default = Oklahoma's OSSAA ladder so only OK schools show out of the box;
  // chips let fans widen it, and a non-empty search always spans every team.
  var DEFAULT_CLASSES = ['OK B2', 'OK B1', 'OK A', 'OK 2A',
                         'OK 3A', 'OK 4A', 'OK 5A', 'OK 6A'];
  var PAGE = 150;
  var tData = null, tGender = 'Boys', tClasses = null, tSearch = '', tLimit = PAGE;

  function classSortKey(lbl) {
    var i = DEFAULT_CLASSES.indexOf(lbl);
    return (i >= 0 ? String.fromCharCode(65 + i) : 'z' + lbl);
  }

  function ordinal(n) {
    var s = ['th', 'st', 'nd', 'rd'], v = n % 100;
    return n + (s[(v - 20) % 10] || s[v] || s[0]);
  }

  function initClassChips() {
    var avail = {};
    tData.teams.forEach(function (t) {
      if (t.class_lbl) avail[t.class_lbl] = 1;
    });
    var picked = DEFAULT_CLASSES.filter(function (c) { return avail[c]; });
    tClasses = {};
    picked.forEach(function (c) { tClasses[c] = 1; });
  }

  function selectedCount() {
    return Object.keys(tClasses).length;
  }

  function renderTeamChips() {
    var g = $('t-gender');
    g.innerHTML = '';
    ['Boys', 'Girls'].forEach(function (gd) {
      var b = document.createElement('button');
      b.textContent = gd;
      if (tGender === gd) b.classList.add('on');
      b.addEventListener('click', function () {
        tGender = gd; tLimit = PAGE; renderTeamChips(); renderTeams();
      });
      g.appendChild(b);
    });

    var box = $('t-classes');
    box.innerHTML = '';
    var labels = {};
    tData.teams.forEach(function (t) {
      if (t.class_lbl) labels[t.class_lbl] = 1;
    });
    var all = document.createElement('button');
    all.textContent = 'All';
    if (!selectedCount()) all.classList.add('on');
    all.addEventListener('click', function () {
      tClasses = {}; tLimit = PAGE; renderTeamChips(); renderTeams();
    });
    box.appendChild(all);
    Object.keys(labels).sort(function (a, b) {
      var ka = classSortKey(a), kb = classSortKey(b);
      return ka < kb ? -1 : ka > kb ? 1 : 0;
    }).forEach(function (c) {
      var b = document.createElement('button');
      b.textContent = c;
      var on = !!tClasses[c];
      if (on) b.classList.add('on');
      b.addEventListener('click', function () {
        if (on) delete tClasses[c]; else tClasses[c] = 1;
        tLimit = PAGE; renderTeamChips(); renderTeams();
      });
      box.appendChild(b);
    });
  }

  function renderTeams() {
    var ul = $('t-list');
    ul.innerHTML = '';
    var f = tSearch.toLowerCase();
    var rows = tData.teams.filter(function (t) {
      if (f) return t.name.toLowerCase().indexOf(f) >= 0;
      if (t.gender !== tGender) return false;
      return !selectedCount() || tClasses[t.class_lbl];
    });
    rows.sort(function (a, b) {
      if (a.rank != null && b.rank != null) {
        if (a.gender !== b.gender) return a.gender < b.gender ? -1 : 1;
        return a.rank - b.rank;
      }
      if ((a.rank != null) !== (b.rank != null)) return a.rank != null ? -1 : 1;
      return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
    });
    rows.slice(0, tLimit).forEach(function (t) {
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '/live/team/' + t.id;
      var sub = [t.class_lbl || null, t.gender,
                 t.class_rank != null && t.class_of > 1
                   ? ordinal(t.class_rank) + ' in class' : null]
        .filter(Boolean).join(' · ');
      a.innerHTML =
        '<span class="rk' + (t.rank != null ? '' : ' un') + '">' +
        (t.rank != null ? '#' + t.rank : '&ndash;') + '</span>' +
        '<span class="nm"><span class="m">' + esc(t.name) + '</span>' +
        '<span class="sub">' + esc(sub) + '</span></span>' +
        '<span class="rec">' + (t.gp ? t.wins + '&ndash;' + t.losses : '') +
        '</span>';
      li.appendChild(a);
      var star = document.createElement('button');
      var fol = isFollowing(t.id);
      star.className = 'star' + (fol ? ' on' : '');
      star.innerHTML = fol ? '★' : '☆';
      star.setAttribute('aria-label', (fol ? 'Unfollow ' : 'Follow ') + t.name);
      star.addEventListener('click', function () {
        toggleFollow(t);
        var now = isFollowing(t.id);
        star.className = 'star' + (now ? ' on' : '');
        star.innerHTML = now ? '★' : '☆';
      });
      li.appendChild(star);
      ul.appendChild(li);
    });
    if (!ul.children.length) {
      ul.innerHTML = '<li><div class="empty">No teams match</div></li>';
    }
    $('t-more').hidden = rows.length <= tLimit;
  }

  function openTeams() {
    if (tData) return;
    fetch('/api/public/teams')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        if (!d) {
          $('t-loading').textContent = 'Couldn’t load teams — try again soon.';
          return;
        }
        tData = d;
        if (d.season) {
          $('t-season').textContent = d.season + ' season';
          $('t-season').hidden = false;
        }
        initClassChips();
        renderTeamChips();
        $('t-loading').hidden = true;
        $('t-list').hidden = false;
        renderTeams();
      })
      .catch(function () {
        $('t-loading').textContent = 'Couldn’t load teams — try again soon.';
      });
  }

  $('t-search').addEventListener('input', function () {
    tSearch = this.value.trim();
    tLimit = PAGE;
    if (tData) renderTeams();
  });
  $('t-more').addEventListener('click', function () {
    tLimit += 300;
    renderTeams();
  });

  function setView(v) {
    view = v;
    $('view-scores').hidden = v !== 'scores';
    $('view-teams').hidden = v !== 'teams';
    $('v-scores').classList.toggle('on', v === 'scores');
    $('v-teams').classList.toggle('on', v === 'teams');
    syncUrl();
    if (v === 'teams') openTeams();
  }
  $('v-scores').addEventListener('click', function () { setView('scores'); });
  $('v-teams').addEventListener('click', function () { setView('teams'); });
  if (view === 'teams') setView('teams');

  renderFollowing();   // show followed teams instantly (before the slate loads)
  load();
})();
</script>
</body>
</html>
